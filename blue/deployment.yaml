apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-blue
  namespace: flags
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
      version: blue
  template:
    metadata:
      labels:
        app: my-app
        version: blue
    spec:
      containers:
        - name: my-app
          image: dalthonmh/flags:0.0.3
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: configmap-blue
